name: Refresh Railbird data

# Keeps the GitHub Pages chart current. Runs on GitHub's servers (not a browser),
# so it can fetch from Railbird directly — the page itself can't, due to CORS.
on:
  schedule:
    - cron: "0 12 * * *"      # daily at 12:00 UTC
  workflow_dispatch: {}        # manual "Run workflow" button in the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # fetch + load + build-site all use only the Python standard library
      # (urllib, csv, sqlite3, json) — no third-party install needed.
      - name: Fetch new reports, rebuild store, regenerate site data
        env:
          PYTHONPATH: src
        run: |
          python -m dkex.fetch          # incremental: only dates not on disk
          python -m dkex.load           # idempotent upsert into SQLite
          python scripts/build_site_data.py

      - name: Commit refreshed data (if anything changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw docs/data.js docs/dkex_sports_breakdown.csv
          if git diff --staged --quiet; then
            echo "No new data — nothing to commit."
          else
            git commit -m "chore: refresh Railbird data ($(date -u +%Y-%m-%d))"
            git push
          fi
